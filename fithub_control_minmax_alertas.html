<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fithub · Control Min/Max &amp; Alertas de Inventario</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f7f5f2; --surface:#ffffff; --surface2:#f0ede8;
  --border:#e8e4de; --text:#1e293b; --muted:#6b7280;
  --orange:#ea6c0a; --green:#059669; --yellow:#d97706;
  --red:#dc2626; --blue:#2563eb; --purple:#7c3aed;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
html, body { height:100%; }
body { font-family:'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text); }

/* ---- loading ---- */
#loading { position:fixed; inset:0; z-index:1000; background:#151d2b; display:flex; align-items:center; justify-content:center; }
.ld-card{ display:flex; flex-direction:column; align-items:center; gap:18px; }
.ld-logo{ font-size:34px; font-weight:900; letter-spacing:-1.5px; color:#fff; }
.ld-logo span{ color:var(--orange); }
.ld-bar{ width:220px; height:3px; background:rgba(255,255,255,.08); border-radius:2px; overflow:hidden; }
.ld-fill{ height:100%; width:40%; background:linear-gradient(90deg,var(--orange),#fbbf24); border-radius:2px; animation:ldSlide 1.1s ease-in-out infinite; }
@keyframes ldSlide{ 0%{ transform:translateX(-100%); } 100%{ transform:translateX(350%); } }
.ld-text{ font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#64748b; }

/* ---- sidebar ---- */
#sidebar{ position:fixed; top:0; left:0; bottom:0; width:220px; background:#1e293b; color:#e2e8f0;
  display:flex; flex-direction:column; padding-bottom:14px; overflow-y:auto; z-index:100; }
.sb-logo{ padding:20px 16px 14px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:6px; }
.sb-logo .b{ font-size:21px; font-weight:900; letter-spacing:-1px; color:#fff; }
.sb-logo .b span{ color:var(--orange); }
.sb-logo .s{ font-size:8px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#475569; margin-top:2px; }
.sb-section{ font-size:9px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase; color:#475569; padding:12px 16px 4px; }
.sb-btn{ display:flex; align-items:center; gap:9px; padding:9px 16px; border:none; background:none; color:#94a3b8;
  cursor:pointer; font-size:12.5px; font-weight:600; text-align:left; width:100%; }
.sb-btn:hover{ background:rgba(255,255,255,.06); color:#e2e8f0; }
.sb-btn.active{ background:rgba(234,108,10,.15); color:#ff9448; border-left:3px solid var(--orange); padding-left:13px; }
.sb-ic{ font-size:14px; width:16px; text-align:center; flex-shrink:0; }
.sb-lbl{ flex:1; }
.sb-badge{ background:rgba(255,255,255,.12); color:#94a3b8; border-radius:10px; padding:1px 7px; font-size:10px; font-weight:700; }
.sb-btn.active .sb-badge{ background:rgba(234,108,10,.25); color:#ff9448; }
.sb-badge.red{ background:rgba(220,38,38,.2); color:#f87171; }
.sb-badge.purple{ background:rgba(124,58,237,.2); color:#c4b5fd; }
.sb-badge.gray{ background:rgba(148,163,184,.2); color:#cbd5e1; }
.sb-badge.yellow{ background:rgba(217,119,6,.2); color:#fbbf24; }

/* ---- main ---- */
#main{ margin-left:220px; min-height:100vh; display:flex; flex-direction:column; }
#topbar{ position:sticky; top:0; z-index:50; background:var(--surface); border-bottom:1px solid var(--border);
  padding:14px 24px; display:flex; align-items:center; justify-content:space-between; gap:14px; flex-wrap:wrap; }
#topbar h2{ font-size:17px; font-weight:800; }
#topbar .desc{ font-size:12px; color:var(--muted); margin-top:2px; }
.filters{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.filters select, .filters input{ font-size:12.5px; padding:7px 10px; border:1px solid var(--border); border-radius:7px; background:#fff; color:var(--text); }
.filters input[type=text]{ min-width:200px; }
.btn{ font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:7px; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.btn.orange{ background:var(--orange); color:#fff; }
.btn.green{ background:var(--green); color:#fff; }
.btn.ghost{ background:#fff; border:1px solid var(--border); color:var(--text); }
.btn:hover{ filter:brightness(0.94); }

#panels{ padding:20px 24px 60px; flex:1; }

/* ---- KPI ---- */
.kpis{ display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:18px; }
.kpi{ background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; box-shadow:var(--shadow); cursor:pointer; }
.kpi:hover{ border-color:var(--orange); }
.kpi .v{ font-size:26px; font-weight:800; line-height:1; }
.kpi .l{ font-size:11px; color:var(--muted); margin-top:6px; font-weight:600; }
.kpi.k-total .v{ color:var(--text); }
.kpi.k-red .v{ color:var(--red); }
.kpi.k-purple .v{ color:var(--purple); }
.kpi.k-gray .v{ color:var(--muted); }
.kpi.k-yellow .v{ color:var(--yellow); }

/* ---- callout / exec summary ---- */
.exec{ background:linear-gradient(135deg, rgba(220,38,38,.07), rgba(234,108,10,.05)); border:1px solid rgba(220,38,38,.2);
  border-radius:10px; padding:13px 18px; margin-bottom:18px; display:flex; gap:18px; flex-wrap:wrap; align-items:center; font-size:12.5px; }
.exec b{ font-weight:800; }

/* ---- charts row ---- */
.charts-row{ display:grid; grid-template-columns:1.1fr 1fr 1fr; gap:14px; margin-bottom:20px; }
.card{ background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:16px; box-shadow:var(--shadow); }
.card h3{ font-size:13px; font-weight:800; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
.donut-wrap{ display:flex; align-items:center; gap:16px; }
.donut{ width:110px; height:110px; border-radius:50%; flex-shrink:0; }
.legend{ display:flex; flex-direction:column; gap:6px; font-size:12px; }
.legend .dot{ width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px; }
.bar-row{ display:flex; align-items:center; gap:8px; margin-bottom:8px; cursor:pointer; }
.bar-row:hover .bar-lbl{ color:var(--orange); }
.bar-lbl{ width:120px; font-size:11.5px; color:var(--text); flex-shrink:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bar-track{ flex:1; background:var(--surface2); border-radius:4px; height:14px; overflow:hidden; }
.bar-fill{ height:100%; border-radius:4px; }
.bar-val{ font-size:11px; font-weight:700; width:38px; text-align:right; flex-shrink:0; }

/* ---- table ---- */
.table-wrap{ overflow-x:auto; border:1px solid var(--border); border-radius:10px; background:var(--surface); box-shadow:var(--shadow); }
table{ width:100%; border-collapse:collapse; }
thead th{ background:var(--surface2); text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.04em;
  color:var(--muted); padding:9px 12px; font-weight:700; white-space:nowrap; cursor:pointer; user-select:none; border-bottom:1px solid var(--border); }
thead th:hover{ color:var(--orange); }
tbody td{ padding:8px 12px; font-size:12.5px; border-top:1px solid var(--border); white-space:nowrap; }
tbody tr:hover{ background:rgba(234,108,10,.06); }
td.num, th.num{ text-align:right; font-variant-numeric:tabular-nums; }
.tag{ font-size:10px; font-weight:800; padding:2px 8px; border-radius:20px; }
.tag.red{ background:rgba(220,38,38,.12); color:var(--red); }
.tag.purple{ background:rgba(124,58,237,.12); color:var(--purple); }
.tag.gray{ background:rgba(107,114,128,.15); color:var(--muted); }
.tag.yellow{ background:rgba(217,119,6,.14); color:var(--yellow); }
.pager{ display:flex; justify-content:space-between; align-items:center; margin-top:10px; font-size:12px; color:var(--muted); }
.pager .p-btns button{ border:1px solid var(--border); background:#fff; border-radius:6px; padding:5px 10px; cursor:pointer; font-size:11.5px; margin-left:4px; }
.pager .p-btns button:disabled{ opacity:.4; }
.empty{ padding:40px; text-align:center; color:var(--muted); font-size:13px; background:var(--surface); border:1px dashed var(--border); border-radius:10px; }

/* ---- accordion (proveedores) ---- */
.acc-item{ background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; overflow:hidden; box-shadow:var(--shadow); }
.acc-head{ display:flex; align-items:center; gap:14px; padding:13px 16px; cursor:pointer; }
.acc-head:hover{ background:var(--surface2); }
.acc-rank{ font-size:12px; font-weight:800; color:var(--muted); width:22px; }
.acc-name{ flex:1; font-size:13px; font-weight:700; }
.acc-stats{ display:flex; gap:14px; font-size:11.5px; }
.acc-stats b{ display:block; font-size:13px; }
.acc-chevron{ font-size:12px; color:var(--muted); transition:transform .15s; }
.acc-item.open .acc-chevron{ transform:rotate(90deg); }
.acc-body{ display:none; border-top:1px solid var(--border); }
.acc-item.open .acc-body{ display:block; }

@media (max-width:1000px){
  .kpis{ grid-template-columns:repeat(2,1fr); }
  .charts-row{ grid-template-columns:1fr; }
  #sidebar{ width:64px; }
  #main{ margin-left:64px; }
  .sb-lbl, .sb-logo .s{ display:none; }
}
</style>
</head>
<body>

<div id="loading">
  <div class="ld-card">
    <div class="ld-logo">fit<span>hub</span></div>
    <div class="ld-bar"><div class="ld-fill" id="ldFill"></div></div>
    <div class="ld-text" id="ldText">Conectando con Google Sheets…</div>
    <div id="ldError" style="display:none; max-width:360px; text-align:center;">
      <div style="font-size:12.5px; color:#fca5a5; margin-bottom:14px; line-height:1.5;" id="ldErrorMsg"></div>
      <button class="btn orange" onclick="loadData()">↺ Reintentar</button>
    </div>
  </div>
</div>

<div id="sidebar">
  <div class="sb-logo"><div class="b">fit<span>hub</span></div><div class="s">Compras &amp; Supply Chain</div></div>
  <div class="sb-section">Principal</div>
  <button class="sb-btn active" data-tab="resumen"><span class="sb-ic">📋</span><span class="sb-lbl">Resumen</span></button>
  <div class="sb-section">Alertas</div>
  <button class="sb-btn" data-tab="rupturaCritica"><span class="sb-ic">🔴</span><span class="sb-lbl">Ruptura crítica</span><span class="sb-badge red" id="badge-rupturaCritica"></span></button>
  <button class="sb-btn" data-tab="ruptura"><span class="sb-ic">🟠</span><span class="sb-lbl">Ruptura (bajo Min)</span><span class="sb-badge" id="badge-ruptura"></span></button>
  <button class="sb-btn" data-tab="exceso"><span class="sb-ic">🟣</span><span class="sb-lbl">Exceso</span><span class="sb-badge purple" id="badge-exceso"></span></button>
  <button class="sb-btn" data-tab="depuracion"><span class="sb-ic">⚫</span><span class="sb-lbl">Depuración</span><span class="sb-badge gray" id="badge-depuracion"></span></button>
  <button class="sb-btn" data-tab="tendenciaBaja"><span class="sb-ic">🟡</span><span class="sb-lbl">Tendencia a la baja</span><span class="sb-badge yellow" id="badge-tendenciaBaja"></span></button>
  <div class="sb-section">Análisis</div>
  <button class="sb-btn" data-tab="proveedores"><span class="sb-ic">🏭</span><span class="sb-lbl">Proveedores</span></button>
  <div class="sb-section">Acción</div>
  <button class="sb-btn" data-tab="erp"><span class="sb-ic">⬆️</span><span class="sb-lbl">Carga ERP</span></button>
  <div style="margin-top:auto; padding:12px 16px 0;">
    <div style="font-size:9.5px; color:#475569; margin-bottom:4px;" id="sbSync">Sincronizando…</div>
    <button class="sb-btn" style="width:100%; border:1px solid rgba(255,255,255,.1); border-radius:6px;" onclick="loadData()">🔄 Recargar datos</button>
  </div>
</div>

<div id="main">
  <div id="topbar">
    <div><h2 id="tbTitle">Resumen</h2><div class="desc" id="tbDesc">Vista general del abastecimiento</div></div>
    <div class="filters" id="tbFilters"></div>
  </div>
  <div id="panels"></div>
</div>

<script>

// ==================== LIVE GOOGLE SHEETS CONNECTION ====================
const SHEET_ID = '1PtWaSlxH1dGuIrvBgaBuEt6BfomybdRF5l9_auNSOf4';
const GID = '0';
const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

const FIELD_ALIASES = {
  store:      ['store','tienda'],
  sku:        ['sku'],
  llave:      ['llave','key'],
  supplier:   ['suppliers','supplier','proveedor','proveedores'],
  brand:      ['brand','marca'],
  product:    ['product','producto'],
  category:   ['categories','category','categoria','categorias'],
  promDia:    ['prom vent dia','promedio venta dia','venta promedio dia','prom vent dia.'],
  consumoMax: ['consumo max'],
  leadTime:   ['lead time'],
  vidaUtil:   ['vida util'],
  min:        ['min'],
  max:        ['max'],
  invActual:  ['inv actual','inventario actual'],
};

function normKey(s){
  return (s==null?'':String(s)).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

let RAW = [];
let MONTH_ORDER = [];
let EXTRA_HEADERS = [];
let lastSync = null;

function buildGvizUrl(){
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json;responseHandler=handleGvizResponse&gid=${GID}&headers=1&_=${Date.now()}`;
}

function showLoadError(msg){
  document.getElementById('ldText').style.display = 'none';
  document.getElementById('ldError').style.display = 'block';
  document.getElementById('ldErrorMsg').textContent = msg;
  document.getElementById('loading').style.display = 'flex';
}

function loadData(){
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('ldText').style.display = 'block';
  document.getElementById('ldError').style.display = 'none';
  const sb = document.getElementById('sbSync'); if(sb) sb.textContent = 'Sincronizando…';
  const old = document.getElementById('gvizScript'); if(old) old.remove();
  const script = document.createElement('script');
  script.id = 'gvizScript';
  script.src = buildGvizUrl();
  script.onerror = ()=> showLoadError('No se pudo conectar con el Google Sheet. Verifica tu conexión o que el archivo siga compartido como "Cualquiera con el enlace: Lector".');
  document.body.appendChild(script);
  window._gvizTimeout = setTimeout(()=>{
    showLoadError('El Google Sheet tardó demasiado en responder. Puede que la hoja no esté publicada/compartida correctamente.');
  }, 20000);
}

function handleGvizResponse(resp){
  clearTimeout(window._gvizTimeout);
  try{
    if(!resp || !resp.table) throw new Error('Respuesta vacía de Google Sheets');
    const cols = resp.table.cols.map(c=> (c.label||'').toString());
    const rawRows = resp.table.rows.map(r=> (r.c||[]).map(cell=> cell ? (cell.v!==undefined?cell.v:null) : null));

    const headerIdx = {};
    cols.forEach((h,i)=>{ if(h) headerIdx[normKey(h)] = i; });

    const fieldIdx = {};
    Object.entries(FIELD_ALIASES).forEach(([field, aliases])=>{
      for(const a of aliases){ if(headerIdx[a]!==undefined){ fieldIdx[field]=headerIdx[a]; break; } }
    });

    const monthCols = MONTHS_ES.filter(m=> headerIdx[normKey(m)]!==undefined)
                               .map(m=> ({name:m, idx:headerIdx[normKey(m)]}));
    MONTH_ORDER = monthCols.map(m=>m.name);

    const usedIdx = new Set([...Object.values(fieldIdx), ...monthCols.map(m=>m.idx)]);
    const extra = cols.map((h,i)=>({h,i})).filter(o=> o.h && !usedIdx.has(o.i));
    EXTRA_HEADERS = extra.map(o=>o.h);

    const numOr0 = v=> typeof v==='number' ? v : (parseFloat(v)||0);

    RAW = rawRows.filter(r=> r.some(v=> v!==null && v!=='')).map(r=>{
      const rec = {};
      Object.entries(fieldIdx).forEach(([field,i])=>{ rec[field]=r[i]; });
      rec.sku = rec.sku!=null ? String(rec.sku) : '';
      rec.store = rec.store!=null ? String(rec.store) : '';
      rec.product = rec.product!=null ? String(rec.product) : '';
      rec.category = rec.category!=null ? String(rec.category) : '';
      rec.supplier = rec.supplier!=null ? String(rec.supplier) : '';
      ['min','max','invActual','consumoMax','leadTime','vidaUtil','promDia'].forEach(f=>{ rec[f]=numOr0(rec[f]); });
      rec.months = {};
      monthCols.forEach(m=>{ rec.months[m.name] = numOr0(r[m.idx]); });
      extra.forEach(o=>{ rec['extra_'+o.h] = r[o.i]; });
      return rec;
    });

    computeAlerts();
    lastSync = new Date();
    const sb = document.getElementById('sbSync');
    if(sb) sb.textContent = '✓ Sincronizado ' + lastSync.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('loading').style.display = 'none';
    render();
  } catch(e){
    showLoadError('Error interpretando la estructura del Google Sheet: ' + e.message);
  }
}

function computeAlerts(){
  const n = MONTH_ORDER.length;
  const last2 = MONTH_ORDER.slice(Math.max(0,n-2));
  const last3 = MONTH_ORDER.slice(Math.max(0,n-3));
  RAW.forEach(r=>{
    const sum2 = last2.reduce((a,m)=>a+(r.months[m]||0),0);
    const sum3 = last3.reduce((a,m)=>a+(r.months[m]||0),0);
    r.rupturaCritica = r.invActual === 0 && r.promDia > 0;
    r.ruptura = r.invActual < r.min;
    r.exceso = r.invActual > r.max && r.max > 0;
    r.excesoCritico = r.exceso && r.invActual > r.max*2;
    r.depuracion = last3.length>=3 && sum3===0 && r.invActual>0;
    r.tendenciaBaja = last2.length>=2 && sum2===0 && r.max>0 && !r.depuracion;
    r.excesoUnid = r.exceso ? (r.invActual - r.max) : 0;
  });
}

function getExtraCols(){
  return EXTRA_HEADERS.map(h=>({ key:'extra_'+h, label:h, render:r=>{ const v=r['extra_'+h]; return v==null?'':v; } }));
}
function getStores(){ return [...new Set(RAW.map(r=>r.store))].filter(Boolean).sort(); }
function getCats(){ return [...new Set(RAW.map(r=>r.category))].filter(Boolean).sort(); }
// ==================== END LIVE CONNECTION ====================

const PALETTE = ['#ea6c0a','#2563eb','#059669','#7c3aed','#d97706','#dc2626','#0891b2','#65a30d','#db2777','#4f46e5'];
function fmt(n){ return Math.round(n||0).toLocaleString('es-CO'); }
function colorFor(i){ return PALETTE[i % PALETTE.length]; }

// ---------------- state ----------------
let state = { tab:'resumen', page:1, pageSize:50, filters:{store:'',category:'',q:''}, sort:{} };

const TABS_META = {
  resumen:{title:'Resumen', desc:'Vista general del abastecimiento', filterable:false},
  rupturaCritica:{title:'Ruptura crítica', desc:'Inventario en cero con venta activa — pérdida de venta hoy mismo', filterable:true},
  ruptura:{title:'Ruptura (bajo Min)', desc:'Inventario por debajo del Min sugerido', filterable:true},
  exceso:{title:'Exceso de mercancía', desc:'Inventario por encima del Max definido', filterable:true},
  depuracion:{title:'Depuración', desc:'Sin venta en los últimos 3 meses cargados, con inventario físico', filterable:true},
  tendenciaBaja:{title:'Tendencia a la baja', desc:'Sin venta en los últimos 2 meses cargados, aún con Max activo', filterable:true},
  proveedores:{title:'Proveedores', desc:'Alertas agrupadas por proveedor — prioriza conversaciones comerciales', filterable:false},
  erp:{title:'Carga ERP', desc:'Exporta el archivo de Min/Max para Dexter', filterable:true},
};

function getRows(tab){
  if(tab==='rupturaCritica') return RAW.filter(r=>r.rupturaCritica);
  if(tab==='ruptura') return RAW.filter(r=>r.ruptura);
  if(tab==='exceso') return RAW.filter(r=>r.exceso);
  if(tab==='depuracion') return RAW.filter(r=>r.depuracion);
  if(tab==='tendenciaBaja') return RAW.filter(r=>r.tendenciaBaja);
  if(tab==='erp') return RAW;
  return RAW;
}

function applyFilters(rows){
  const f = state.filters;
  return rows.filter(r=>
    (!f.store || r.store===f.store) &&
    (!f.category || r.category===f.category) &&
    (!f.q || (r.product+' '+r.sku+' '+r.supplier).toLowerCase().includes(f.q.toLowerCase()))
  );
}

function applySort(rows, tab){
  const s = state.sort[tab];
  if(!s) return rows;
  const {col, dir} = s;
  return [...rows].sort((a,b)=>{
    let av=a[col], bv=b[col];
    if(typeof av==='string'){ av=av.toLowerCase(); bv=(bv||'').toLowerCase(); return dir*av.localeCompare(bv); }
    return dir*((av||0)-(bv||0));
  });
}

function setSort(tab, col){
  const cur = state.sort[tab];
  if(cur && cur.col===col){ cur.dir *= -1; } else { state.sort[tab] = {col, dir:1}; }
  render();
}
window.setSort = setSort;

function setFilter(k,v){ state.filters[k]=v; state.page=1; render(); }
window.setFilter = setFilter;
function resetFilters(){ state.filters={store:'',category:'',q:''}; state.page=1; render(); }
window.resetFilters = resetFilters;

let pendingScrollSupplier = null;
function goTab(tab, presetCat){
  state.tab = tab; state.page = 1;
  state.filters = {store:'',category: presetCat||'',q:''};
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  render();
}
window.goTab = goTab;

function goProveedor(supplier){
  state.tab = 'proveedores'; state.page = 1;
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab==='proveedores'));
  render();
  requestAnimationFrame(()=>{
    const el = [...document.querySelectorAll('[data-sup]')].find(e=>e.getAttribute('data-sup')===supplier);
    if(el){ el.classList.add('open'); if(typeof el.scrollIntoView==='function'){ el.scrollIntoView({behavior:'smooth', block:'center'}); } }
  });
}

// ---------------- csv/xlsx export ----------------
function csvEsc(v){ const s=String(v); return /[",;\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }
function downloadCSV(filename, headers, rows){
  const lines=[headers.join(',')].concat(rows.map(r=>r.map(csvEsc).join(',')));
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
}
function downloadXLSX(filename, headers, rows, sheetName){
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName||'Datos');
  XLSX.writeFile(wb, filename);
}
function exportERP(rows, base){
  const headers=['store','product','min_qty','max_qty'];
  const data = rows.map(r=>[r.store, r.product, Math.round(r.min), Math.round(r.max)]);
  downloadCSV(base+'.csv', headers, data);
}
window.exportERP = exportERP;
function exportAlert(rows, base){
  const headers=['store','sku','product','category','supplier','consumo_max','min','max','inv_actual','venta_dia'].concat(EXTRA_HEADERS);
  const data = rows.map(r=>[r.store,r.sku,r.product,r.category,r.supplier,r.consumoMax,Math.round(r.min),Math.round(r.max),Math.round(r.invActual),r.promDia].concat(EXTRA_HEADERS.map(h=>r['extra_'+h])));
  downloadXLSX(base+'.xlsx', headers, data, base.slice(0,30));
}
window.exportAlert = exportAlert;

// ---------------- charts ----------------
function donutSVG(parts){
  const total = parts.reduce((a,p)=>a+p.value,0) || 1;
  let acc = 0;
  const R=50, C=2*Math.PI*R;
  const circles = parts.map(p=>{
    const frac = p.value/total;
    const dash = frac*C;
    const el = `<circle r="${R}" cx="60" cy="60" fill="none" stroke="${p.color}" stroke-width="18"
      stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${-acc}" transform="rotate(-90 60 60)"/>`;
    acc += dash;
    return el;
  }).join('');
  return `<svg viewBox="0 0 120 120" class="donut">${circles}</svg>`;
}

function barChartHTML(items, colors){
  const max = Math.max(...items.map(i=>i.value), 1);
  return items.map((it,i)=>`
    <div class="bar-row" onclick="${it.onclick}">
      <div class="bar-lbl" title="${it.label.replace(/"/g,'&quot;')}">${it.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(it.value/max*100).toFixed(1)}%; background:${colors[i%colors.length]}"></div></div>
      <div class="bar-val">${fmt(it.value)}</div>
    </div>`).join('');
}

    <div class="kpi k-red" onclick="goTab('rupturaCritica')"><div class="v">${fmt(counts.rc)}</div><div class="l">Ruptura crítica</div></div>
    <div class="kpi k-purple" onclick="goTab('exceso')"><div class="v">${fmt(counts.exc)}</div><div class="l">Exceso de mercancía</div></div>
    <div class="kpi k-gray" onclick="goTab('depuracion')"><div class="v">${fmt(counts.dep)}</div><div class="l">Depuración (sin rotación)</div></div>
    <div class="kpi k-yellow" onclick="goTab('tendenciaBaja')"><div class="v">${fmt(counts.tend)}</div><div class="l">Tendencia a la baja</div></div>

        <div class="legend">${byStore.map(s=>`<div><span class="dot" style="background:${s.color}"></span>${s.label} — ${fmt(s.value)}</div>`).join('')}</div>
      </div>
    </div>
    <div class="card">
      <h3>🔴 Top categorías — ruptura crítica</h3>
      ${barChartHTML(topCatCritica, ['#dc2626'])}

// ---------------- generic table panels ----------------
function sortIndicator(tab, col){
  const s = state.sort[tab];
  if(!s || s.col!==col) return '';
  return s.dir===1 ? ' ▲' : ' ▼';
}

function tableGeneric(tab, rows, cols){
  const sorted = applySort(rows, tab);
  const start = (state.page-1)*state.pageSize;
  const view = sorted.slice(start, start+state.pageSize);
  if(!view.length) return '<div class="empty">🎉 Ningún resultado con los filtros actuales.</div>';
  const pages = Math.max(1, Math.ceil(sorted.length/state.pageSize));
  return `
  <div class="table-wrap"><table>
    <thead><tr>
      ${cols.map(c=>`<th class="${c.num?'num':''}" onclick="setSort('${tab}','${c.key}')">${c.label}${sortIndicator(tab,c.key)}</th>`).join('')}
    </tr></thead>
    <tbody>
      ${view.map(r=>`<tr>${cols.map(c=>`<td class="${c.num?'num':''}">${c.render? c.render(r) : (c.num? fmt(r[c.key]) : r[c.key])}</td>`).join('')}</tr>`).join('')}
    </tbody>
  </table></div>
  <div class="pager">
    <div>${fmt(sorted.length)} resultado(s) · página ${state.page} de ${fmt(pages)}</div>
    <div class="p-btns">
      <button onclick="gotoPage(1)" ${state.page<=1?'disabled':''}>«</button>
      <button onclick="gotoPage(${state.page-1})" ${state.page<=1?'disabled':''}>‹</button>
      <button onclick="gotoPage(${state.page+1})" ${state.page>=pages?'disabled':''}>›</button>
      <button onclick="gotoPage(${pages})" ${state.page>=pages?'disabled':''}>»</button>
    </div>
  </div>`;
}
function gotoPage(p){ state.page=Math.max(1,p); render(); }
window.gotoPage = gotoPage;

function getBaseCols(){
  return [
    {key:'store', label:'Tienda'},
    {key:'sku', label:'SKU'},
    {key:'product', label:'Producto'},
    {key:'category', label:'Categoría'},
    {key:'supplier', label:'Proveedor'},
    {key:'consumoMax', label:'Consumo Max', num:true},
    {key:'min', label:'Min', num:true},
    {key:'max', label:'Max', num:true},
    {key:'invActual', label:'Inv. Actual', num:true},
    {key:'promDia', label:'Vta/día', num:true},
  ];
}

function panelAlert(tab, extraCols, calloutHTML){
  const rows = applyFilters(getRows(tab));
  const cols = getBaseCols().concat(extraCols||[]).concat(getExtraCols());
  return `${calloutHTML||''}${tableGeneric(tab, rows, cols)}`;
}

function panelERP(){
  const rows = applyFilters(getRows('erp'));
  const cols = [
    {key:'store', label:'Tienda'},
    {key:'sku', label:'SKU'},
    {key:'product', label:'Producto'},
    {key:'category', label:'Categoría'},
    {key:'supplier', label:'Proveedor'},
    {key:'consumoMax', label:'Consumo Max', num:true},
    {key:'min', label:'Min', num:true},
    {key:'max', label:'Max', num:true},
    {key:'invActual', label:'Inv. Actual', num:true},
  ].concat(getExtraCols());
  return tableGeneric('erp', rows, cols);
}

// ---------------- proveedores accordion ----------------
function panelProveedores(){
  const sup = {};
  RAW.forEach(r=>{
    if(!sup[r.supplier]) sup[r.supplier] = {supplier:r.supplier, total:0, rc:0, exc:0, dep:0, tend:0, rows:[]};
    const s = sup[r.supplier];
    s.total++;
    if(r.rupturaCritica) s.rc++;
    if(r.exceso) s.exc++;
    if(r.depuracion) s.dep++;
    if(r.tendenciaBaja) s.tend++;
    s.rows.push(r);
  });
  const list = Object.values(sup)
    .map(s=>({...s, impact: s.rc*3 + s.exc + s.dep*2}))
    .filter(s=>s.impact>0)
    .sort((a,b)=>b.impact-a.impact)
    .slice(0,40);

  return `
    <div class="exec">🏭 <span>Proveedores ordenados por impacto (ruptura crítica × 3 + depuración × 2 + exceso). Útil para priorizar conversaciones comerciales.</span></div>
    ${list.map((s,i)=>`
      <div class="acc-item" data-sup="${s.supplier.replace(/"/g,'&quot;')}">
        <div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
          <div class="acc-rank">#${i+1}</div>
          <div class="acc-name">${s.supplier}</div>
          <div class="acc-stats">
            <div>🔴<b>${s.rc}</b></div>
            <div>🟣<b>${s.exc}</b></div>
            <div>⚫<b>${s.dep}</b></div>
            <div>🟡<b>${s.tend}</b></div>
            <div>Σ<b>${s.total}</b></div>
          </div>
          <div class="acc-chevron">▶</div>
        </div>
        <div class="acc-body">
          ${tableGenericStatic(s.rows.slice(0,200))}
        </div>
      </div>`).join('')}
  `;
}

function tableGenericStatic(rows){
  if(!rows.length) return '<div class="empty">Sin datos.</div>';
  return `<div class="table-wrap"><table>
    <thead><tr><th>Tienda</th><th>SKU</th><th>Producto</th><th class="num">Consumo Max</th><th class="num">Min</th><th class="num">Max</th><th class="num">Inv. Actual</th><th>Estado</th></tr></thead>
    <tbody>${rows.map(r=>{
      let tag='';
      if(r.rupturaCritica) tag='<span class="tag red">RUPTURA CRÍTICA</span>';
      else if(r.exceso) tag='<span class="tag purple">EXCESO</span>';
      else if(r.depuracion) tag='<span class="tag gray">DEPURACIÓN</span>';
      else if(r.tendenciaBaja) tag='<span class="tag yellow">TENDENCIA BAJA</span>';
      return `<tr><td>${r.store}</td><td>${r.sku}</td><td>${r.product}</td><td class="num">${fmt(r.consumoMax)}</td><td class="num">${fmt(r.min)}</td><td class="num">${fmt(r.max)}</td><td class="num">${fmt(r.invActual)}</td><td>${tag}</td></tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

// ---------------- filter bar (topbar) ----------------
function renderFilterBar(){
  const meta = TABS_META[state.tab];
  const el = document.getElementById('tbFilters');
  if(!meta.filterable){ el.innerHTML=''; return; }
  el.innerHTML = `
    <select onchange="setFilter('store',this.value)">
      <option value="">Todas las tiendas</option>
      ${getStores().map(s=>`<option value="${s}" ${state.filters.store===s?'selected':''}>${s}</option>`).join('')}
    </select>
    <select onchange="setFilter('category',this.value)">
      <option value="">Todas las categorías</option>
      ${getCats().map(c=>`<option value="${c}" ${state.filters.category===c?'selected':''}>${c}</option>`).join('')}
    </select>
    <input type="text" placeholder="Buscar producto, SKU o proveedor…" value="${state.filters.q}" oninput="setFilter('q',this.value)">
    <button class="btn ghost" onclick="resetFilters()">✕ Limpiar</button>
    ${state.tab==='erp' ? `
      <button class="btn ghost" onclick="exportERP(applyFilters(getRows('erp')),'fithub_minmax_erp_filtrado')">Exportar filtrado</button>
      <button class="btn orange" onclick="exportERP(RAW,'fithub_minmax_erp_completo')">Exportar TODO</button>
    ` : `<button class="btn orange" onclick="exportAlert(applyFilters(getRows('${state.tab}')), 'alerta_${state.tab}')">⬇ Exportar alerta</button>`}
  `;
}

// ---------------- render dispatcher ----------------
function render(){
  const meta = TABS_META[state.tab];
  document.getElementById('tbTitle').textContent = meta.title;
  document.getElementById('tbDesc').textContent = meta.desc;
  renderFilterBar();

  document.getElementById('badge-rupturaCritica').textContent = fmt(RAW.filter(r=>r.rupturaCritica).length);
  document.getElementById('badge-ruptura').textContent = fmt(RAW.filter(r=>r.ruptura).length);
  document.getElementById('badge-exceso').textContent = fmt(RAW.filter(r=>r.exceso).length);
  document.getElementById('badge-depuracion').textContent = fmt(RAW.filter(r=>r.depuracion).length);
  document.getElementById('badge-tendenciaBaja').textContent = fmt(RAW.filter(r=>r.tendenciaBaja).length);

  const panels = document.getElementById('panels');
  if(state.tab==='resumen'){
    panels.innerHTML = panelResumen();
  } else if(state.tab==='erp'){
    panels.innerHTML = panelERP();
  } else if(state.tab==='proveedores'){
    panels.innerHTML = panelProveedores();
  } else if(state.tab==='rupturaCritica'){
    panels.innerHTML = panelAlert('rupturaCritica', [{key:'estado',label:'Estado',render:r=>'<span class="tag red">SIN STOCK</span>'}],
      '<div class="exec">🔴 <span><b>Acción sugerida:</b> generar orden de compra inmediata o transferencia entre tiendas.</span></div>');
  } else if(state.tab==='ruptura'){
    panels.innerHTML = panelAlert('ruptura', [{key:'estado',label:'Estado',render:r=>r.rupturaCritica?'<span class="tag red">CRÍTICO</span>':'<span class="tag yellow">BAJO MIN</span>'}]);
  } else if(state.tab==='exceso'){
    panels.innerHTML = panelAlert('exceso', [{key:'excesoUnid',label:'Unid. excedentes',num:true}]);
  } else if(state.tab==='depuracion'){
    panels.innerHTML = panelAlert('depuracion', [{key:'estado',label:'Estado',render:r=>'<span class="tag gray">SIN ROTACIÓN 3M</span>'}],
      '<div class="exec">⚫ <span><b>Acción sugerida:</b> negociar devolución/crédito con el proveedor o consolidar en un solo punto de venta.</span></div>');
  } else if(state.tab==='tendenciaBaja'){
    panels.innerHTML = panelAlert('tendenciaBaja', [{key:'estado',label:'Estado',render:r=>'<span class="tag yellow">2 MESES SIN VENTA</span>'}]);
  }
}

// ---------------- nav wiring ----------------
document.querySelectorAll('.sb-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(!btn.dataset.tab) return; // e.g. reload button shares class but has its own onclick
    document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.tab = btn.dataset.tab; state.page=1; state.filters={store:'',category:'',q:''};
    render();
  });
});

loadData();
